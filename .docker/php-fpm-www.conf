[www]
user = www-data
group = www-data

; 使用 TCP 端口，与 Nginx fastcgi_pass 127.0.0.1:9000 保持一致
listen = 127.0.0.1:9000

pm = dynamic
pm.max_children = 50
pm.start_servers = 5
pm.min_spare_servers = 5
pm.max_spare_servers = 35
pm.max_requests = 500

; 错误日志输出到 stderr（容器日志）
php_admin_value[error_log] = /proc/self/fd/2
php_admin_flag[log_errors] = on

; 清理环境变量，避免泄漏
clear_env = no
