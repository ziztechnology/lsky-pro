# =============================================================================
# Lsky Pro - Ziztechnology 生产部署配置
# 镜像由 GitHub Actions 自动构建并推送至 GHCR
# 部署平台：1Panel（外部网络 1panel-network）
# NAS 存储：群晖 //10.31.0.106/lsky-pro（CIFS 挂载）
#
# 挂载策略说明：
#   - vendor/ 和代码留在镜像内，升级时重新拉取镜像即可
#   - 只持久化真正需要保留的数据：.env、storage/、database/
# =============================================================================

services:
  lsky-pro:
    image: ghcr.io/ziztechnology/lsky-pro:latest

    container_name: lsky-pro
    hostname: lsky-pro

    restart: unless-stopped

    ports:
      - "40027:8089"

    environment:
      - WEB_PORT=8089

    volumes:
      # .env 配置文件（首次启动后手动编辑）
      - $PWD/web/.env:/var/www/html/.env

      # 用户上传的文件和框架缓存
      - $PWD/web/storage:/var/www/html/storage

      # SQLite 数据库（如使用 MySQL 可删除此行）
      - $PWD/web/database:/var/www/html/database

      # NAS 存储挂载：群晖 SMB 共享，用于图片存储
      - nas-share:/mnt/ziztech_storage.lan/

    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8089/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

    deploy:
      resources:
        limits:
          memory: 1G
        reservations:
          memory: 256M

    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "5"

# =============================================================================
# 网络配置：接入 1Panel 管理的外部网络
# =============================================================================
networks:
  default:
    external: true
    name: 1panel-network

# =============================================================================
# 卷配置：CIFS 挂载群晖 NAS
# =============================================================================
volumes:
  nas-share:
    driver: local
    driver_opts:
      type: cifs
      device: "//10.31.0.106/lsky-pro"
      o: "username=BobYoung,password=Dyrxb792,vers=3.0,iocharset=utf8,file_mode=0777,dir_mode=0777,uid=33,gid=33,noperm"
